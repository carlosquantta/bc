<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantta Animado</title>
    <style>
        /* 1. Reset Total */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1b1a; /* Fondo oscuro base */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. Contenedor Principal */
        .canvas {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #111211;
            overflow: hidden;
        }

        /* 3. Las Manchas (Blobs) con Animación Forzada */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            /* Nombre de animación | Duración | Dirección | Loop */
            animation: floating 20s infinite alternate ease-in-out;
            will-change: transform; /* Optimización de rendimiento */
        }

        .blob-green {
            width: 45vw;
            height: 45vw;
            background: #a4b44d; /* Verde oliva de la imagen */
            top: -5%;
            left: -10%;
            animation-duration: 25s;
        }

        .blob-blue {
            width: 40vw;
            height: 40vw;
            background: #4a5d6e; /* Azul grisáceo oscuro */
            bottom: -5%;
            right: -5%;
            animation-duration: 18s;
            animation-delay: -2s;
        }

        /* DEFINICIÓN DE LA ANIMACIÓN */
        @keyframes floating {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(10vw, 5vh) scale(1.1);
            }
            66% {
                transform: translate(-5vw, 15vh) scale(0.9);
            }
            100% {
                transform: translate(5vw, -5vh) scale(1.05);
            }
        }

        /* 4. Capa de Grano (Textura) */
        .grain {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0.18;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* 5. Logo Central */
        .logo {
            position: relative;
            z-index: 20;
            text-align: center;
            color: #d1dc8c;
            font-family: 'Times New Roman', serif;
        }

        .logo h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            margin: 0;
            letter-spacing: -1px;
        }

        .logo p {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: -5px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="canvas">
        <div class="blob blob-green"></div>
        <div class="blob blob-blue"></div>
        
        <div class="grain"></div>

        <div class="logo">
            <h1>Quantta</h1>
            <p>Estrategia y Sistemas</p>
        </div>
    </div>

</body>
</html>
