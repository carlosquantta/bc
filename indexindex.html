<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantta - Mesh Amorfo</title>
    <style>
        :root {
            --bg-color: #231501;
            --blue-color: #80A9DA;
            --green-color: #D2FF4A;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .canvas {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            overflow: hidden;
        }

        /* Configuración de formas AMORFAS */
        .blob {
            position: absolute;
            /* Radio irregular para que no parezcan círculos */
            border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%;
            filter: blur(140px); /* Blur aumentado para suavidad extrema */
            opacity: 0.55;
            will-change: transform;
            animation: move infinite alternate ease-in-out;
        }

        /* Blobs con posiciones y tamaños randomizados */
        .v1 { width: 60vw; height: 45vw; background: var(--green-color); top: -20%; left: -10%; animation-duration: 12s; animation-name: moveV1; }
        .v2 { width: 50vw; height: 60vw; background: var(--green-color); bottom: -15%; right: 5%; animation-duration: 18s; animation-name: moveV2; }
        .a1 { width: 55vw; height: 50vw; background: var(--blue-color); top: 5%; right: -15%; animation-duration: 15s; animation-name: moveA1; }
        .a2 { width: 45vw; height: 40vw; background: var(--blue-color); bottom: 5%; left: -5%; animation-duration: 20s; animation-name: moveA2; }

        /* Movimientos con trayectorias más agresivas */
        @keyframes moveV1 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(20vw, 15vh) rotate(45deg) scale(1.2); }
        }
        @keyframes moveV2 {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-25vw, -20vh) rotate(-30deg) scale(1.1); }
        }
        @keyframes moveA1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-30vw, 25vh) scale(0.8) rotate(90deg); }
        }
        @keyframes moveA2 {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(15vw, -30vh) rotate(-60deg) scale(1.3); }
        }

        /* GRANO ULTRA CHICO - Frecuencia 1.8 */
        .grain {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0.18;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .logo {
            position: relative;
            z-index: 20;
            text-align: center;
            color: var(--green-color);
            font-family: 'Times New Roman', Times, serif;
        }

        .logo h1 {
            font-size: clamp(3rem, 12vw, 6rem);
            margin: 0;
            font-weight: 700;
            letter-spacing: -2px;
        }

        .logo p {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-top: -5px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="canvas">
        <div class="blob v1"></div>
        <div class="blob a1"></div>
        <div class="blob v2"></div>
        <div class="blob a2"></div>
        
        <div class="grain"></div>

        <div class="logo">
            <h1>Quantta</h1>
            <p>Estrategia y Sistemas</p>
        </div>
    </div>

</body>
</html>
