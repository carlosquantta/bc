<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantta - Mesh Random Start</title>
    <style>
        :root {
            --bg-color: #231501;
            --blue-color: #80A9DA;
            --green-color: #D2FF4A;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .canvas {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            filter: blur(100px);
            opacity: 0.4;
            will-change: transform;
            animation: move infinite alternate ease-in-out;
        }

        /* POSICIONES INICIALES DISPERSAS */
        
        /* Verde 1: Arriba Izquierda */
        .v1 { 
            width: 30vw; height: 25vw; 
            background: var(--green-color); 
            top: -5%; left: -5%; 
            animation-duration: 11s; 
            animation-name: moveV1; 
        }

        /* Verde 2: Abajo Derecha */
        .v2 { 
            width: 25vw; height: 30vw; 
            background: var(--green-color); 
            bottom: 5%; right: 5%; 
            animation-duration: 15s; 
            animation-delay: -2s;
            animation-name: moveV2; 
        }

        /* Azul 1: Arriba Derecha */
        .a1 { 
            width: 35vw; height: 25vw; 
            background: var(--blue-color); 
            top: 10%; right: -10%; 
            animation-duration: 13s; 
            animation-delay: -5s;
            animation-name: moveA1; 
        }

        /* Azul 2: Abajo Izquierda */
        .a2 { 
            width: 28vw; height: 28vw; 
            background: var(--blue-color); 
            bottom: 10%; left: 0%; 
            animation-duration: 17s; 
            animation-delay: -8s;
            animation-name: moveA2; 
        }

        /* TRAYECTORIAS CRUZADAS */
        @keyframes moveV1 {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(50vw, 30vh) rotate(120deg) scale(1.2); }
        }
        @keyframes moveV2 {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-45vw, -50vh) rotate(-90deg) scale(0.8); }
        }
        @keyframes moveA1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-60vw, 40vh) scale(1.3) rotate(-120deg); }
        }
        @keyframes moveA2 {
            0% { transform: translate(0, 0) scale(1.1); }
            100% { transform: translate(40vw, -45vh) scale(0.7) rotate(180deg); }
        }

        /* GRANO ULTRA FINO */
        .grain {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0.14;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='3.1' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .logo {
            position: relative;
            z-index: 20;
            text-align: center;
            color: var(--green-color);
            font-family: 'Times New Roman', Times, serif;
        }

        .logo h1 {
            font-size: clamp(2.5rem, 10vw, 5rem);
            margin: 0;
            font-weight: 700;
            letter-spacing: -2px;
        }

        .logo p {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: -5px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="canvas">
        <div class="blob v1"></div>
        <div class="blob a1"></div>
        <div class="blob v2"></div>
        <div class="blob a2"></div>
        
        <div class="grain"></div>

        <div class="logo">
            <h1>Quantta</h1>
            <p>Estrategia y Sistemas</p>
        </div>
    </div>

</body>
</html>
