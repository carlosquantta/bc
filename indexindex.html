<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantta - Mesh Animado Pro</title>
    <style>
        :root {
            --bg-color: #231501;
            --blue-color: #80A9DA;
            --green-color: #D2FF4A;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .canvas {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            overflow: hidden;
        }

        /* Configuración de las bolas */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px); /* Desenfoque más suave */
            opacity: 0.5;
            animation: move infinite alternate ease-in-out;
            will-change: transform;
        }

        /* Verdes */
        .v1 { width: 50vw; height: 50vw; background: var(--green-color); top: -10%; left: -10%; animation-duration: 15s; }
        .v2 { width: 40vw; height: 40vw; background: var(--green-color); bottom: -5%; right: 15%; animation-duration: 22s; animation-delay: -3s; }

        /* Azules */
        .a1 { width: 45vw; height: 45vw; background: var(--blue-color); top: 10%; right: -5%; animation-duration: 18s; animation-delay: -5s; }
        .a2 { width: 35vw; height: 35vw; background: var(--blue-color); bottom: 10%; left: 5%; animation-duration: 25s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(8vw, 12vh) scale(1.15); }
            100% { transform: translate(-4vw, 5vh) scale(0.95); }
        }

        /* GRANO FINO - Ajustado para que no se vea pixelado */
        .grain {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0.12; /* Más sutil */
            /* Se aumentó baseFrequency a 0.9 para grano más pequeño */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* Logo */
        .logo {
            position: relative;
            z-index: 20;
            text-align: center;
            color: var(--green-color);
            font-family: 'Times New Roman', Times, serif;
            text-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .logo h1 {
            font-size: clamp(2.5rem, 10vw, 5rem);
            margin: 0;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .logo p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-top: -5px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="canvas">
        <div class="blob v1"></div>
        <div class="blob a1"></div>
        <div class="blob v2"></div>
        <div class="blob a2"></div>
        
        <div class="grain"></div>

        <div class="logo">
            <h1>Quantta</h1>
            <p>Estrategia y Sistemas</p>
        </div>
    </div>

</body>
</html>
